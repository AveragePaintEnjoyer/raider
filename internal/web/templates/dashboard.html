<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>raider</title>
<link rel="stylesheet" href="/static/css/style.css">
<link rel="icon" type="image/x-icon" href="/static/img/favicon.png">
<script src="https://unpkg.com/htmx.org@1.9.10"></script>
<script defer src="/static/js/darkmode.js"></script>
<script defer src="/static/js/tags.js"></script>
<script defer src="/static/js/tree.js"></script>
</head>
<body>
<h1>raider</h1>

<div class="menu-bar">
  <div>
    <a href="/">Dashboard</a>
    <a href="/categories">Manage categories</a>
    <a href="/tags">Manage tags</a>
  </div>
  <div class="toggle-btn" onclick="toggleDarkMode()">Dark mode</div>
</div>

<div class="layout">
  <!-- LEFT SIDE -->
  <div id="sidebar"
      class="sidebar"
      hx-get="/sidebar"
      hx-trigger="load, refreshSidebar from:body"
      hx-swap="innerHTML">
    <div class="table-box">
      <em>Loading…</em>
    </div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="content"
      hx-trigger="refreshContent from:body">
    <p class="placeholder">
      Select an entry to see details here.
    </p>
  </div>
</div>


</body>
</html>
