<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>raider</title>
<link rel="stylesheet" href="/static/css/style.css">
<link rel="icon" type="image/x-icon" href="/static/img/favicon.png">
<script>
function toggleDarkMode() {
  document.body.classList.toggle('dark');
  localStorage.setItem('darkMode', document.body.classList.contains('dark'));
}

window.onload = function() {
  if (localStorage.getItem('darkMode') === 'true') {
    document.body.classList.add('dark');
  }
};

function saveTreeState() {
  document.querySelectorAll("details[data-key]").forEach(d => {
    localStorage.setItem("tree:" + d.dataset.key, d.open ? "1" : "0");
  });
}

function restoreTreeState() {
  document.querySelectorAll("details[data-key]").forEach(d => {
    const state = localStorage.getItem("tree:" + d.dataset.key);
    if (state === "1") d.open = true;
  });
}

/* save when toggling */
document.body.addEventListener("toggle", e => {
  if (e.target.matches("details[data-key]")) saveTreeState();
});

/* restore after sidebar swap */
document.body.addEventListener("htmx:afterSwap", e => {
  if (e.target.id === "sidebar") restoreTreeState();
});

/* initial load restore */
window.addEventListener("load", restoreTreeState);
</script>
<script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body>
<h1>raider</h1>

<div class="menu-bar">
  <div>
    <a href="/">Dashboard</a>
    <a href="/categories">Manage categories</a>
    <a href="/tags">Manage tags</a>
  </div>
  <div class="toggle-btn" onclick="toggleDarkMode()">Dark mode</div>
</div>

<div class="layout">
  <!-- LEFT SIDE -->
  <div id="sidebar"
      class="sidebar"
      hx-get="/sidebar"
      hx-trigger="load, refreshSidebar from:body"
      hx-swap="innerHTML">
    <div class="table-box">
      <em>Loading…</em>
    </div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="content"
      hx-trigger="refreshContent from:body">
    <p class="placeholder">
      Select an entry to see details here.
    </p>
  </div>
</div>


</body>
</html>
