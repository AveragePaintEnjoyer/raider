<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>raider</title>
<link rel="stylesheet" href="/static/css/style.css">
<script>
function toggleDarkMode() {
  document.body.classList.toggle('dark');
  localStorage.setItem('darkMode', document.body.classList.contains('dark'));
}

window.onload = function() {
  if (localStorage.getItem('darkMode') === 'true') {
    document.body.classList.add('dark');
  }
};
</script>
</head>
<body>
<h1>raider</h1>

<div class="menu-bar">
  <div>
    <a href="/">Dashboard</a>
    <a href="/categories">Manage categories</a>
    <a href="/tags">Manage tags</a>
  </div>
  <div class="toggle-btn" onclick="toggleDarkMode()">Dark mode</div>
</div>

<!-- Add Tag Form -->
<form action="/tags/add" method="POST" class="form-box">
  <label>Name:
    <input class="form-input" type="text" name="name" required>
  </label>

  <button class="form-input add-btn" type="submit">Add tag</button>
</form>
<br>
<div class="table-box">
      <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      {{range .Tags}}
      <tr>
        <td>{{.Name}}</td>
        <td>
          <form action="/tags/delete/{{.ID}}" method="POST" onsubmit="return confirm('Delete this tag?');">
            <button class="form-input" type="submit">Delete</button>
          </form>
        </td>
      </tr>
      {{else}}
      <tr><td colspan="4">No tags yet.</td></tr>
      {{end}}
    </tbody>
</div>

</body>
</html>
