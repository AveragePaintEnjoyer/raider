<div class="table-box">
  <h2>{{ .Entry.Name }}</h2>

  <p><strong>Rating:</strong> {{ .Entry.Rating }}/10</p>

  <p>
    <strong>Category:</strong>
    {{ .Entry.Category.MainCategory.Name }} →
    {{ .Entry.Category.Name }}
  </p>

  <p class="tag-line">
    <strong>Tags:</strong>
    {{ if .Entry.Tags }}
      {{ range .Entry.Tags }}
        <span class="tag-label">{{ .Name }}</span>
      {{ end }}
    {{ else }}
      <span class="tag-none">none</span>
    {{ end }}
  </p>

  {{ if .Entry.ImagePath }}
  <div id="entry-image">
    {{ template "entry_image" . }}
  </div>
  {{ end }}

  <hr>

  <div class="actions">
    <button class="form-input"
            hx-get="/entries/{{ .Entry.ID }}/edit"
            hx-target=".content"
            hx-swap="innerHTML">
      Edit
    </button>

    <button class="form-input"
            hx-post="/entries/{{ .Entry.ID }}/delete"
            hx-confirm="Delete this entry?"
            hx-target=".content"
            hx-swap="innerHTML">
      Delete
    </button>
  </div>
</div>
