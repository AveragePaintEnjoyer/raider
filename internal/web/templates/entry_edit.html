<div class="table-box">
  <h2>Edit Entry</h2>

  <form hx-post="/entries/{{ .Entry.ID }}/edit"
        hx-target=".content"
        hx-swap="innerHTML"
        hx-encoding="multipart/form-data"
        enctype="multipart/form-data">

    <label>Name:
      <input class="form-input"
             type="text"
             name="name"
             value="{{ .Entry.Name }}"
             required>
    </label>

    <label>Rating:
      <input class="form-input"
             type="number"
             name="rating"
             min="1"
             max="10"
             value="{{ .Entry.Rating }}">
    </label>

    <label>Category:
      <select class="form-input" name="category_id">
        {{ range .Categories }}
          <option value="{{ .ID }}"
            {{ if eq .ID $.Entry.CategoryID }}selected{{ end }}>
            {{ .Name }}
          </option>
        {{ end }}
      </select>
    </label>

    <div class="form-group">
      <label>Tags:</label>

      <div class="tag-select">
        <!-- Selected tags -->
        <div class="tag-input" tabindex="0">
          <div id="selected-tags" class="tag-chips">
            {{ range .Entry.Tags }}
              <span class="tag-chip" data-id="{{ .ID }}">
                {{ .Name }}
                <button type="button" class="remove">&times;</button>
              </span>
            {{ end }}
          </div>
          <input type="text" placeholder="Add tag…" class="tag-search">
        </div>

        <!-- Dropdown -->
        <div class="tag-dropdown">
          {{ range .Tags }}
            <div class="tag-option" data-id="{{ .ID }}">
              {{ .Name }}
            </div>
          {{ end }}
        </div>

        <input type="hidden" name="tags" id="tags-input">
      </div>
    </div>

    <label>
      Image:
      {{ if .Entry.ImagePath }}
        <div id="entry-image">
          {{ template "entry_image" . }}
        </div>
      {{ end }}

      <input type="file"
            name="image"
            accept="image/*">
    </label>

    <div class="actions">
      <button class="form-input add-btn" type="submit">
        Save
      </button>

      <button class="form-input"
              hx-get="/entries/{{ .Entry.ID }}"
              hx-target=".content"
              hx-swap="innerHTML"
              type="button">
        Cancel
      </button>
    </div>
  </form>
</div>
