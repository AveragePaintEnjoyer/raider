---
- name: Basic web application server setup
  hosts: webservers
  become: true
  vars:
    webapp_user: raider
    webapp_home: "/srv/{{ webapp_user }}"
    ssh_dir: "{{ webapp_home }}/.ssh"
    local_dir: "/Users/nx/Code/Hubgit/raider"
    git_name: git

  tasks:
    - name: Ensure system is up-to-date
      apt:
        upgrade: dist
        update_cache: yes
        cache_valid_time: 3600

    - name: Create webapp user with home under /srv
      user:
        name: "{{ webapp_user }}"
        home: "{{ webapp_home }}"
        shell: /bin/bash
        create_home: yes

